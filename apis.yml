apis:
  - aid: storybook:storybook
    name: Storybook
    description: >-
      Storybook is an open-source frontend workshop for building UI components and
      pages in isolation. Supports React, Vue, Angular, Svelte, Web Components, Ember,
      Preact, and more. Core features include component story format (CSF), interactive
      controls, documentation generation, interaction testing, accessibility testing,
      and visual snapshot testing. Published component libraries serve as living design
      system documentation for engineering and design teams.
    humanURL: https://storybook.js.org/
    tags:
      - Accessibility Testing
      - Component Documentation
      - Component Testing
      - Design Systems
      - Frontend Development
      - Open Source
      - UI Components
      - Visual Testing
    properties:
      - type: Documentation
        url: https://storybook.js.org/docs
      - type: Website
        url: https://storybook.js.org/
      - type: GitHubRepository
        url: https://github.com/storybookjs/storybook
      - type: NPM
        url: https://www.npmjs.com/package/storybook
      - type: Changelog
        url: https://github.com/storybookjs/storybook/blob/next/CHANGELOG.md
      - type: Tutorials
        url: https://storybook.js.org/tutorials/
      - type: Integrations
        url: https://storybook.js.org/integrations/
  - aid: storybook:storybook-mcp
    name: Storybook MCP Server
    description: >-
      The Storybook MCP (Model Context Protocol) server enables AI agents to interact
      with a running Storybook instance. Available as the @storybook/addon-mcp addon
      (runs within the dev server at /mcp) and @storybook/mcp standalone library.
      Exposes tools for listing documentation, accessing component metadata, previewing
      stories, and running component tests. Supports React projects in Storybook 10.3+.
    humanURL: https://storybook.js.org/docs/ai/mcp/overview
    tags:
      - AI
      - Component Testing
      - MCP
      - Model Context Protocol
      - Open Source
      - React
    properties:
      - type: Documentation
        url: https://storybook.js.org/docs/ai/mcp/overview
      - type: GitHubRepository
        url: https://github.com/storybookjs/mcp
      - type: NPM
        url: https://www.npmjs.com/package/@storybook/addon-mcp
      - type: Blog
        url: https://storybook.js.org/blog/storybook-mcp-for-react/

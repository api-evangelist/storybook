aid: storybook
name: Storybook
description: >-
  Storybook is the industry-standard frontend workshop for building, documenting,
  and testing UI components in isolation. It supports React, Vue, Angular, Svelte,
  Web Components, and a dozen other frameworks. Developers write stories capturing
  component states, use addons for interaction testing, accessibility auditing,
  visual testing, and design integration, and publish component documentation for
  design systems and component libraries. Storybook 10+ includes an MCP server
  enabling AI agents to understand components, generate stories, and run tests.
  The project is open source (MIT) and maintained by the storybookjs GitHub organization.
